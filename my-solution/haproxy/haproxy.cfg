global
    maxconn 20000
    nbthread 1

defaults
    mode    http
    timeout connect 1s
    timeout client  5s
    timeout server  5s
    option  http-server-close

frontend http_front
    bind *:9999
    default_backend api_servers

backend api_servers
    balance roundrobin

    server api1 /run/sock/api1.sock maxconn 10000
    server api2 /run/sock/api2.sock maxconn 10000
